<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Smart Basket - ReceiptAI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<nav class="nav nav-pills nav-fill mb-4">
    <a class="nav-link" href="/scan">Scanare</a>
    <a class="nav-link" href="/history">Istoric</a>
    <a class="nav-link active" href="/smart-basket">Smart Basket</a>
    <a class="nav-link text-danger" href="/logout">Logout</a>
</nav>

<div class="card p-4 shadow-sm">
    <h3 class="mb-3">Calculeaza cosul optim</h3>
    <p class="text-muted">Vezi unde iesi cel mai ieftin.</p>

    <form action="/smart-basket/calculate" method="post">
        <div class="mb-3">
            <label class="form-label fw-bold">Lista de cumpărături (separate prin virgulă):</label>
            <textarea name="products" class="form-control" rows="3" placeholder="Ex: Lapte, Oua, Banane, Cascaval" th:text="${lastList}" required></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" name="strategy" value="single" class="btn btn-primary flex-grow-1">
                Cel mai ieftin magazin
            </button>
            <button type="submit" name="strategy" value="mixed" class="btn btn-success flex-grow-1">
                Cel mai mic pret per produs
            </button>
        </div>
    </form>
</div>

<div th:if="${singleStoreResults}" class="mt-4">
    <h4>Top Magazine:</h4>
    <div class="list-group">
        <div th:each="res : ${singleStoreResults}" class="list-group-item">

            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h5 th:text="${res.storeName}" class="mb-1 text-dark"></h5>
                    <small class="text-muted">
                        Gasite: <span th:text="${res.foundProductCount}" class="fw-bold"></span>
                        <span th:if="${res.missingProductCount > 0}" class="text-danger ms-2">
                                (Lipsesc: <span th:text="${res.missingProductCount}"></span>)
                            </span>
                    </small>
                </div>
                <span class="badge bg-primary rounded-pill fs-5" th:text="${res.totalCost} + ' RON'"></span>
            </div>

            <details class="mt-2" style="border-top: 1px solid #eee; padding-top: 10px;">
                <summary class="text-primary fw-bold" style="cursor: pointer; font-size: 0.9em;">
                    Vezi lista de produse si preturi
                </summary>
                <ul class="list-group list-group-flush mt-2">
                    <li th:each="item : ${res.items}" class="list-group-item d-flex justify-content-between py-1 bg-light">
                        <span th:text="${item.name}"></span>
                        <span class="fw-bold text-dark" th:text="${item.price} + ' RON'"></span>
                    </li>
                </ul>
            </details>

        </div>
    </div>
</div>

<div th:if="${mixedStoreResults}" class="mt-4">
    <div class="alert alert-success">
        <h4 class="alert-heading">Cel mai mic pret posibil: <span th:text="${totalAbsolut} + ' RON'"></span></h4>
        <p class="mb-0">Trebuie sa vizitezi mai multe magazine pentru a obtine acest pret.</p>
    </div>

    <div class="row">
        <div th:each="entry : ${mixedStoreResults}" class="col-md-6 mb-3">
            <div class="card h-100 border-success">
                <div class="card-header bg-success text-white fw-bold" th:text="${entry.key}">Magazin</div>
                <ul class="list-group list-group-flush">
                    <li th:each="item : ${entry.value}" class="list-group-item d-flex justify-content-between">
                        <span th:text="${item.productName}"></span>
                        <span class="fw-bold text-success" th:text="${item.price} + ' RON'"></span>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>

</body>
</html>
