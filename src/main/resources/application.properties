spring.application.name=receptai

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/receiptai}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent}

services.embedding.single-url=${EMBED_SINGLE_URL:http://127.0.0.1:8000/embed}
services.embedding.batch-url=${EMBED_BATCH_URL:http://127.0.0.1:8000/embed_batch}
services.vector.search-url=${VECTOR_SEARCH_URL:http://127.0.0.1:8081/search}
services.vector.add-url=${VECTOR_ADD_URL:http://127.0.0.1:8081/add_vector}
services.vector.rebuild-url=${VECTOR_REBUILD_URL:http://127.0.0.1:8081/admin/rebuild_master}

app.sync.enabled=${APP_SYNC_ENABLED:true}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
