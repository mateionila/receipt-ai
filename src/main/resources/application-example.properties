spring.application.name=receptai

spring.datasource.url=jdbc:postgresql://localhost:5432/receiptai
spring.datasource.username=postgres
spring.datasource.password=replace_me
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

gemini.api.key=replace_me
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent

services.embedding.single-url=http://127.0.0.1:8000/embed
services.embedding.batch-url=http://127.0.0.1:8000/embed_batch
services.vector.search-url=http://127.0.0.1:8081/search
services.vector.add-url=http://127.0.0.1:8081/add_vector
services.vector.rebuild-url=http://127.0.0.1:8081/admin/rebuild_master

app.sync.enabled=true

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
